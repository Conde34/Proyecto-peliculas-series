<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Mi Catálogo</title>
</head>

<body>
    <div class="container-fluid">
        <!-- Aside -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-icon">
                    <img class="sidebar-icon-foto" src="/images/logo.png" alt="Foto usuario">
                </div>
            </div>

            <nav class="nav-menu">
                <div class="nav-item active">
                    <i class="fas fa-home"></i>
                    <span>Inicio</span>
                </div>
                <div class="nav-item">
                    <i class="fas fa-list"></i>
                    <span>Títulos</span>
                </div>
                <div class="nav-item">
                    <i class="fas fa-tag"></i>
                    <span>Géneros</span>
                </div>
            </nav>

            <div class="user-profile">
                <div class="user-avatar">
                    <img class="user-avatar-foto"
                        src="https://m.media-amazon.com/images/S/pv-target-images/16627900db04b76fae3b64266ca161511422059cd24062fb5d900971003a0b70.jpg"
                        alt="Foto de perfil">
                </div>
                <div>
                    <div style="font-weight: 600;">CondeuS</div>
                    <div style="color: #a0a0b0;">Admin</div>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="header-title">
                    <h1>Mis Títulos</h1>
                    <p>Explora y gestiona tu catálogo personal</p>
                </div>
                <button class="add-btn">
                    <i class="fas fa-plus"></i> Agregar Título
                </button>
            </header>

            <!-- Filtros -->
            <div class="filters-section">
                <div class="search-box">
                    <input type="text" placeholder="Buscar título...">
                </div>
                <select class="filter-select">
                    <option>Todos los tipos</option>
                    <option>Series</option>
                    <option>Películas</option>
                </select>
                <select class="filter-select">
                    <option>Todas las plataformas</option>
                    <option>Netflix</option>
                    <option>Prime Video</option>
                    <option>HBO Max</option>
                    <option>Apple TV+</option>
                </select>
                <select class="filter-select">
                    <option>Todos los estados</option>
                    <option>Visto</option>
                    <option>En curso</option>
                    <option>Pendiente</option>
                </select>
                <select class="filter-select">
                    <option>Todos los géneros</option>
                    <option>Ciencia Ficción</option>
                    <option>Drama</option>
                    <option>Comedia</option>
                    <option>Terror</option>
                </select>
            </div>

            <!-- Content -->
            <div class="content-area">
                <!-- Grid de títulos -->
                <div id="idTitulos" class="titles-grid">

                </div>
                <!-- Paginacion -->
                <div class="pagination-container">
                    <button class="pagination-btn"><i class="fas fa-chevron-left"></i></button>
                    <button class="pagination-btn active">1</button>
                    <button class="pagination-btn">2</button>
                    <button class="pagination-btn"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-w76AqPfDzYxF4eD1z5LzqXVRl5sxQjxmKbXH4yc2g0xpwGHZfSx8xfGkxDeD6+5+"
            crossorigin="anonymous"></script>

        <script>
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.querySelector('.sidebar');

            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
            });

            // Cerrar sidebar al hacer clic en un item de navegación
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    if (window.innerWidth < 768) {
                        sidebar.classList.remove('active');
                    }
                });
            });

            // Cerrar sidebar cuando se hace clic fuera
            document.addEventListener('click', (e) => {
                if (window.innerWidth < 768) {
                    if (!e.target.closest('.sidebar') && !e.target.closest('.menu-toggle')) {
                        sidebar.classList.remove('active');
                    }
                }
            });
        </script>
</body>

</html>
