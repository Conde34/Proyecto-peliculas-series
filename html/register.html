<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>

    <link rel="stylesheet" href="../css/styleRegister.css">

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

    <div class="ContenedorLogin">

        <form class="FormularioLogin" id="formularioRegister">

            <h2>REGISTRARSE</h2>

            <span>Nombre:</span>
            <input type="text" id="nombre" placeholder="Ingresa tu nombre...">

            <span>Apellido:</span>
            <input type="text" id="apellido" placeholder="Ingresa tu apellido...">

            <span>Nombre de Usuario:</span>
            <input type="text" id="nombreUsu" placeholder="Ingresa tu usuario...">

            <span>Correo Electrónico:</span>
            <input type="email" id="correo" placeholder="Ingresa tu correo...">

            <span>Contraseña:</span>
            <input type="password" id="contrasenia" placeholder="Ingresa tu contraseña...">

            <button type="button" id="btnRegistrar">
                REGISTRARSE
            </button>

            <span id="mensaje"></span>

            <p>
                ¿Ya tienes cuenta?
                <a href="login.html">Iniciar Sesión</a>
            </p>

        </form>

    </div>

    <script src="/js/register.js"></script>

</body>

</html>
