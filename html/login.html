<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="/css/styleLogin.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

    <div class="ContenedorLogin">
        <form class="FormularioLogin" id="formularioLogin">
            <h2>INICIAR SESIÓN</h2>
            
            <span>Correo Electrónico:</span>
            <input type="text" id="usuario" placeholder="Ingresa tu correo electrónico...">
            
            <span>Contraseña:</span>
            <input type="password" id="contraseña" placeholder="Ingresa tu contraseña...">
            
            <button type="button" id="btnIngresar">INICIAR SESIÓN</button>
            
            <span id="mensaje"></span>
            
            <p>¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
        </form>
    </div>

    <script src="/js/login.js"></script>

</body>

</html>
