<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- script js -->
    <script src="/js/inicio.js" defer></script>
    <!-- script iconos -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- script axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- link boostrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- link css -->
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="shortcut icon" href="../images/logo.png" type="image/x-icon">

    <title>Inicio</title>
</head>

<body>

    <div class="menuLogo">
        <ion-icon name="menu-outline"></ion-icon>
        <ion-icon name="close-outline"></ion-icon>
    </div>

    <aside class="menuLateral">

        <div class="nombrePagina">
            <img id="logo" class="logoSinFondo" src="../images/logo.png" alt="Logo pagina">
            <span>Peliculonas</span>
        </div>

        <nav class="navegacion">
            <ul>
                <li>
                    <a class="ini" href="index.html">
                        <ion-icon name="home-outline"></ion-icon>
                        <span>Inicio</span>
                    </a>
                </li>
                <li>
                    <a class="gen" href="./genero.html">
                        <ion-icon name="videocam-outline"></ion-icon>
                        <span>Géneros</span>
                    </a>
                </li>
                <li id="liAdmin">
                    <a class="adm" href="/html/admin.html">
                        <ion-icon name="person-outline"></ion-icon>
                        <span>Admin</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="linea"></div>

        <div class="usuario">
            <img src="/images/messi.jpg" alt="foto perfil">
            <div class="infoUsuario">
                <div class="nombre-rol">
                    <span class="nombre" id="sidebarNombre">Santi</span>
                    <span class="rol" id="sidebarRol">Admin</span>
                </div>
            </div>
            <ion-icon id="btnCerrarSesion" name="log-out-outline" title="Cerrar sesión" style="cursor:pointer; font-size:20px; color:var(--textoSecundario); flex-shrink:0;"></ion-icon>
        </div>
    </aside>
    <main>
        <!-- Header -->
        <header class="header">

            <div class="encabezado">
                <div class="header-title">
                    <h1>Mis Títulos</h1>
                    <p>Explora y gestiona tu catálogo personal</p>
                </div>
            </div>
            <div class="linea"></div>

            <div class="selects">
                <input type="search" name="buscador" class="inputSearch" placeholder="Buscar titulo...">

                <select class="form-select" aria-label="Default select example">
                    <option selected>Todos los tipos</option>
                    <option value="peliculas">Peliculas</option>
                    <option value="series">Series</option>
                </select>

                <select class="form-select" aria-label="Default select example">
                    <option selected>Todos las plataformas</option>
                    <option value="netflix">Netflix</option>
                    <option value="max">Max</option>
                    <option value="primeVideo">Prime video</option>
                </select>

                <select class="form-select" aria-label="Default select example">
                    <option selected>Todos los estados</option>
                    <option value="visto">Visto</option>
                    <option value="enCurso">En curso</option>
                    <option value="pendiente">Pendiente</option>
                </select>

                <select class="form-select" aria-label="Default select example">
                    <option selected>Todos los generos</option>
                    <option value="visto">Ciencia ficcion</option>
                    <option value="enCurso">Drama</option>
                    <option value="enCurso">Comedia</option>
                    <option value="pendiente">Crimen y Suspenso</option>
                </select>

            </div>

            <br>

            <div id="idTitulos">

            </div>
        </header>

    </main>

</body>

</html>
