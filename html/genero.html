<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- script js -->
<script src="../js/script.js" defer></script>
<script src="../js/genero.js" defer></script>
    <!-- script iconos -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- link css -->
    <link rel="stylesheet" href="../css/genero.css">
    <link rel="shortcut icon" href="../images/logo.png" type="image/x-icon">
    <title>Géneros</title>
</head>

<body>

    <div class="menuLogo">
        <ion-icon name="menu-outline"></ion-icon>
        <ion-icon name="close-outline"></ion-icon>
    </div>

    <aside class="menuLateral">

        <div class="nombrePagina">
            <img class="logoSinFondo" src="../images/logo.png" alt="Logo pagina">
            <span>Peliculonas</span>
        </div>

        <nav class="navegacion">
            <ul>
                <li>
                    <a class="ini" href="index.html">
                        <ion-icon name="home-outline"></ion-icon>
                        <span>Inicio</span>
                    </a>
                </li>
                <li>
                    <a class="gen" href="genero.html">
                        <ion-icon name="videocam-outline"></ion-icon>
                        <span>Géneros</span>
                    </a>
                </li>
                <li>
                    <a class="adm" href="admin.html">
                        <ion-icon name="person-outline"></ion-icon>
                        <span>Admin</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="linea"></div>

        <div class="usuario">
            <img src="/images/messi.jpg" alt="foto perfil">
            <div class="infoUsuario">
                <div class="nombre-rol">
                    <span class="nombre">Santi</span>
                    <span class="rol">Admin</span>
                </div>
            </div>
        </div>
    </aside>
<main class="pagina-genero">

    <header class="header">
        <div>
            <h1>Géneros</h1>
            <p>Administra los géneros disponibles</p>
        </div>
        <button class="add-btn">+ Agregar Género</button>
    </header>

    <div class="tabla-container">
        <table class="tabla-generos">
            <thead>
                <tr>
                    <th>GÉNERO</th>
                    <th>COLOR</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="genreContainer"></tbody>
        </table>
    </div>
</main>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 id="modaltitulo">Agregar Género</h2>
        <div class="modal-campo">
            <label>Nombre</label>
            <input type="text" id="inputNombre" placeholder="Ej: Terror">
        </div>
        <div class="modal-campo">
            <label>Color</label>
            <input type="color" id="inputColor" value="#7c3aed">
        </div>
        <div class="modal-botones">
            <button class="btn-cancelar" id="btnCancelar">Cancelar</button>
            <button class="btn-guardar" id="btnGuardar">Guardar</button>
        </div>
    </div>
</div>
</body>

</html>
